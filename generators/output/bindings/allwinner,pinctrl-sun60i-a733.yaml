%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/allwinner,pinctrl-sun60i-a733.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Allwinner A733 Pin Controller

maintainers:
  - sun60iw2-upstream contributors <dev@sun60iw2.local>

description: |
  The Allwinner A733 pin controller manages GPIO and pin multiplexing for PA-PK banks.

properties:
  compatible:
    const: allwinner,sun60i-a733-pinctrl

  reg:
    maxItems: 1

  interrupts:
    maxItems: 10
    minItems: 1
    description: One interrupt per GPIO bank

  clocks:
    items:
      - description: APB clock
      - description: High frequency oscillator
      - description: Low frequency oscillator

  clock-names:
    items:
      - const: apb
      - const: hosc
      - const: losc

  gpio-controller:
    type: boolean

  #gpio-cells:
    const: 3
    description: Bank, pin, flags

  interrupt-controller:
    type: boolean

  #interrupt-cells:
    const: 3

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - gpio-controller
  - #gpio-cells
  - interrupt-controller
  - #interrupt-cells

additionalProperties: false

examples:
  - |
      pio: pinctrl@2000000 {
          compatible = "allwinner,sun60i-a733-pinctrl";
          reg = <0x2000000 0x600>;
          interrupts = <GIC_SPI 69 IRQ_TYPE_LEVEL_HIGH>,
                       <GIC_SPI 71 IRQ_TYPE_LEVEL_HIGH>;
          clocks = <&ccu CLK_APB1>, <&osc24M>, <&rtc_ccu CLK_OSC32K>;
          clock-names = "apb", "hosc", "losc";
          gpio-controller;
          #gpio-cells = <3>;
          interrupt-controller;
          #interrupt-cells = <3>;
      };
