%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/allwinner,r-pinctrl-sun60i-a733.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Allwinner A733 R-Domain Pin Controller

maintainers:
  - sun60iw2-upstream contributors <dev@sun60iw2.local>

description: |
  The R-domain pin controller manages GPIO for the always-on PL-PM banks.

properties:
  compatible:
    const: allwinner,sun60i-a733-r-pinctrl

  reg:
    maxItems: 1

  interrupts:
    maxItems: 2

  clocks:
    items:
      - description: APB clock
      - description: High frequency oscillator
      - description: Low frequency oscillator

  clock-names:
    items:
      - const: apb
      - const: hosc
      - const: losc

  gpio-controller:
    type: boolean

  #gpio-cells:
    const: 3

  interrupt-controller:
    type: boolean

  #interrupt-cells:
    const: 3

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - gpio-controller
  - #gpio-cells
  - interrupt-controller
  - #interrupt-cells

additionalProperties: false

examples:
  - |
      r_pio: pinctrl@7025000 {
          compatible = "allwinner,sun60i-a733-r-pinctrl";
          reg = <0x7025000 0x410>;
          interrupts = <GIC_SPI 198 IRQ_TYPE_LEVEL_HIGH>,
                       <GIC_SPI 200 IRQ_TYPE_LEVEL_HIGH>;
          clocks = <&r_ccu CLK_R_APBS0>, <&osc24M>, <&rtc_ccu CLK_OSC32K>;
          clock-names = "apb", "hosc", "losc";
          gpio-controller;
          #gpio-cells = <3>;
          interrupt-controller;
          #interrupt-cells = <3>;
      };
