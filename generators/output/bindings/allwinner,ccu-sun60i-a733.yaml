%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/allwinner,ccu-sun60i-a733.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Allwinner A733 Clock Controller Unit (CCU)

maintainers:
  - sun60iw2-upstream contributors <dev@sun60iw2.local>

description: |
  The Allwinner A733 CCU provides clocks and resets for all on-chip peripherals.

properties:
  compatible:
    const: allwinner,sun60i-a733-ccu

  reg:
    maxItems: 1
    description: CCU register region

  clocks:
    items:
      - description: High frequency oscillator (24 MHz)
      - description: Low frequency oscillator (32.768 kHz)

  clock-names:
    items:
      - const: hosc
      - const: losc

  #clock-cells:
    const: 1
    description: One cell indicating the clock index

  #reset-cells:
    const: 1
    description: One cell indicating the reset index

required:
  - compatible
  - reg
  - clocks
  - clock-names
  - #clock-cells
  - #reset-cells

additionalProperties: false

examples:
  - |
      ccu: clock-controller@2002000 {
          compatible = "allwinner,sun60i-a733-ccu";
          reg = <0x02002000 0x2000>;
          clocks = <&osc24M>, <&rtc_ccu CLK_OSC32K>;
          clock-names = "hosc", "losc";
          #clock-cells = <1>;
          #reset-cells = <1>;
      };
